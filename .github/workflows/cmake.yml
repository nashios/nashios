name: Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        arch: [i686]
        toolchain: [gnu]

    steps:
      - uses: actions/checkout@v3

      - name: Toolchain cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/binary/cache/toolchain-${{ matrix.arch }}-${{ matrix.toolchain }}.tar.gz
          key: ${{ runner.os }}-toolchain-${{ matrix.arch }}-${{ hashFiles('meta/scripts/toolchain/*.sh', 'meta/patches/*.patch', 'libraries/c/**/*.h') }}

      - name: Compile cmake
        run: meta/scripts/nashios.sh build cmake

      - name: Compile toolchain
        run: meta/scripts/nashios.sh build toolchain --arch=${{ matrix.arch }} --toolchain=${{ matrix.toolchain }} --cache=true

      - name: Compile system
        run: meta/scripts/nashios.sh build system --arch=${{ matrix.arch }} --toolchain=${{ matrix.toolchain }}
