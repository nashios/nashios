name: Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        arch: [i686, x86_64]
        toolchain: [gnu]

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/ppa
          sudo apt update
          sudo apt install cmake gcc-13 g++-13

      - name: Toolchain cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/binary/cache/toolchain-${{ matrix.arch }}-${{ matrix.toolchain }}.tar.gz
          key: ${{ runner.os }}-toolchain-${{ matrix.arch }}-${{ hashFiles('meta/scripts/toolchain/*.sh', 'meta/patches/*.patch', 'libraries/c/**/*.h') }}

      - name: Compile toolchain
        run: meta/scripts/nashios.sh toolchain ${{ matrix.arch }} ${{ matrix.toolchain }} cache=true

      - name: Compile system
        run: meta/scripts/nashios.sh build ${{ matrix.arch }} ${{ matrix.toolchain }}

      - name: Install system
        run: meta/scripts/nashios.sh install ${{ matrix.arch }} ${{ matrix.toolchain }}
