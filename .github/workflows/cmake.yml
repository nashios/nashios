name: Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        arch: [i686]
        toolchain: [gnu]

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential cmake curl libmpfr-dev libmpc-dev libgmp-dev ninja-build ccache rsync unzip texinfo libssl-dev fuse2fs

      - name: Toolchain cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/binary/cache/toolchain-${{ matrix.arch }}-${{ matrix.toolchain }}.tar.gz
          key: ${{ runner.os }}-toolchain-${{ matrix.arch }}-${{ hashFiles('meta/scripts/toolchain/*.sh', 'meta/patches/*.patch', 'libraries/c/**/*.h') }}

      - name: Compile toolchain
        run: USE_CACHE=true Meta/Scripts/NashiOS.sh toolchain ${{ matrix.arch }} ${{ matrix.toolchain }}

      - name: Compile system
        run: Meta/Scripts/NashiOS.sh build ${{ matrix.arch }} ${{ matrix.toolchain }}

      - name: Install system
        run: Meta/Scripts/NashiOS.sh install ${{ matrix.arch }} ${{ matrix.toolchain }}
