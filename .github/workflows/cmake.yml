name: Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        arch: [i686]

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential cmake curl libmpfr-dev libmpc-dev libgmp-dev ninja-build ccache rsync unzip texinfo libssl-dev

      - name: Configure
        run: cmake --preset ${{ matrix.arch }}

      - name: Toolchain cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/binary/toolchain/${{ matrix.arch }}/cache/toolchain.tar.gz
          key: ${{ runner.os }}-toolchain-${{ matrix.arch }}-${{ hashFiles('meta/scripts/setup-toolchain.sh') }}

      - name: Compile toolchain
        run: USE_CACHE=true cmake --build --preset ${{ matrix.arch }} --target toolchain

      - name: Compile system
        run: cmake --build --preset ${{ matrix.arch }} --target all

      - name: Install system
        run: cmake --build --preset ${{ matrix.arch }} --target install
